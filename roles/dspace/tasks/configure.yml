---
- name: cria diretorio config
  file:
    path: "{{ dspace_install_dir }}/config"
    state: directory
    owner: "{{ dspace_user }}"
    group: "{{ dspace_group }}"
    mode: "0755"

- name: adiciona tomcat ao grupo dspace para ler configuracoes
  user:
    name: tomcat
    groups: "{{ dspace_group }}"
    append: yes

- name: deploy local.cfg
  template:
    src: local.cfg.j2
    dest: "{{ dspace_install_dir }}/config/local.cfg"
    owner: "{{ dspace_user }}"
    group: "{{ dspace_group }}"
    mode: "0640"
  notify: restart tomcat

# Perfil de submissao UFJF (formularios de deposito). Estes arquivos definem quais
# campos aparecem no deposito, dropdowns e mapeamento colecao->formulario. NAO vem no
# dump do banco -- precisam ser deployados em disco. Ler em
# https://wiki.lyrasis.org/display/DSDOC9x/Submission+User+Interface
- name: deploy configuracao de submissao (forms UFJF)
  copy:
    src: "{{ item }}"
    dest: "{{ dspace_install_dir }}/config/{{ item }}"
    owner: "{{ dspace_user }}"
    group: "{{ dspace_group }}"
    mode: "0644"
  loop:
    - submission-forms.xml
    - item-submission.xml
    - default.license
  notify: restart tomcat
