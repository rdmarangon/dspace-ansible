---
- name: instala nginx e git
  apt:
    name:
      - nginx
      - git
    state: present

- name: cria diretorio de sitemaps
  file:
    path: "{{ sitemaps_dir }}"
    state: directory
    owner: "{{ nginx_user }}"
    group: "{{ nginx_group }}"
    mode: "0755"

- name: deploy configuracao global do nginx
  template:
    src: nginx-global.conf.j2
    dest: /etc/nginx/conf.d/00-global.conf
    mode: "0644"
  notify: reload nginx

- name: adiciona chave GPG do NodeSource
  get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"

- name: adiciona repositorio Node.js {{ node_major_version }}.x
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ node_major_version }}.x nodistro main"
    state: present
    filename: nodesource
    update_cache: yes

- name: instala Node.js {{ node_major_version }}
  apt:
    name: nodejs
    state: present

- name: cria diretorio do fonte do Angular
  file:
    path: "{{ dspace_angular_src }}"
    state: directory
    owner: "{{ nginx_user }}"
    group: "{{ nginx_group }}"
    mode: "0755"

- name: verifica se o repositorio Angular ja existe
  stat:
    path: "{{ dspace_angular_src }}/.git"
  register: angular_git

- name: clona DSpace Angular {{ dspace_angular_version }}
  become_user: "{{ nginx_user }}"
  git:
    repo: "https://github.com/DSpace/dspace-angular.git"
    dest: "{{ dspace_angular_src }}"
    version: "{{ dspace_angular_version }}"
    depth: 1
  when: not angular_git.stat.exists

- name: deploy config.prod.yml
  template:
    src: config.prod.yml.j2
    dest: "{{ dspace_angular_src }}/config/config.prod.yml"
    owner: "{{ nginx_user }}"
    group: "{{ nginx_group }}"
    mode: "0644"
  notify: restart dspace-ui

- name: verifica se node_modules esta completo
  stat:
    path: "{{ dspace_angular_src }}/node_modules/.package-lock.json"
  register: node_modules_lock

# Remove como root para evitar ENOTEMPTY de arquivos criados por root em
# execucoes anteriores que o www-data nao consegue deletar
- name: remove node_modules incompleto antes do npm ci
  file:
    path: "{{ dspace_angular_src }}/node_modules"
    state: absent
  when: not node_modules_lock.stat.exists

# O home do www-data e /var/www; se o cache npm foi criado por root em execucoes
# anteriores, o www-data nao consegue acessar e npm falha com EACCES.
- name: corrige dono do cache npm do www-data
  file:
    path: "/var/www/.npm"
    state: directory
    owner: "{{ nginx_user }}"
    group: "{{ nginx_group }}"
    mode: "0755"
    recurse: yes
  when: not node_modules_lock.stat.exists

- name: instala dependencias npm
  become_user: "{{ nginx_user }}"
  command: npm install
  args:
    chdir: "{{ dspace_angular_src }}"
  environment:
    NODE_ENV: development
    NODE_OPTIONS: "--max-old-space-size=4096"
    CYPRESS_INSTALL_BINARY: "0"  # nao baixa o binario do Cypress (desnecessario em producao)
  when: not node_modules_lock.stat.exists

# O Ansible grava o estado de jobs async em ~/.ansible_async/ do usuario que executa
# a task. O home do www-data e /var/www (pertence ao root), entao precisa criar
# o subdiretorio manualmente antes.
- name: cria diretorio de async do Ansible para www-data
  file:
    path: /var/www/.ansible_async
    state: directory
    owner: "{{ nginx_user }}"
    group: "{{ nginx_group }}"
    mode: "0700"

# Build com SSR: gera dist/dspace-ui/browser/ e dist/dspace-ui/server/
# Pode levar 10-20 minutos. Requer ~2 GB de RAM livre.
- name: build Angular SSR (10-20 min)
  become_user: "{{ nginx_user }}"
  command: npm run build:ssr
  args:
    chdir: "{{ dspace_angular_src }}"
    creates: "{{ dspace_angular_src }}/dist/server/main.js"
  environment:
    NODE_ENV: production
  async: 2400
  poll: 30

- name: instala servico systemd do dspace-ui
  template:
    src: dspace-ui.service.j2
    dest: "/etc/systemd/system/{{ dspace_ui_service }}.service"
    mode: "0644"
  notify:
    - restart dspace-ui

- name: habilita e inicia servico dspace-ui
  systemd:
    name: "{{ dspace_ui_service }}"
    state: started
    enabled: yes
    daemon_reload: yes

- name: copia certificado SSL
  copy:
    src: "ssl/{{ dspace_hostname }}.crt"
    dest: "{{ ssl_cert_path }}"
    mode: "0644"
  notify: reload nginx

- name: copia chave privada SSL
  copy:
    src: "ssl/{{ dspace_hostname }}.key"
    dest: "{{ ssl_key_path }}"
    mode: "0600"
  notify: reload nginx

- name: deploy configuracao nginx
  template:
    src: nginx-dspace.conf.j2
    dest: /etc/nginx/sites-available/dspace.conf
    mode: "0644"
  notify: reload nginx

- name: habilita site nginx
  file:
    src: /etc/nginx/sites-available/dspace.conf
    dest: /etc/nginx/sites-enabled/dspace.conf
    state: link
  notify: reload nginx

- name: remove site padrao do nginx
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: ajusta dono do diretorio Angular
  file:
    path: "{{ dspace_angular_src }}"
    owner: "{{ nginx_user }}"
    group: "{{ nginx_group }}"
    recurse: yes

- name: garante que o nginx esta iniciado e habilitado
  service:
    name: nginx
    state: started
    enabled: yes

- name: libera HTTP no ufw
  ufw:
    rule: allow
    port: "{{ nginx_http_port }}"
    proto: tcp

- name: libera HTTPS no ufw
  ufw:
    rule: allow
    port: "{{ nginx_https_port }}"
    proto: tcp
